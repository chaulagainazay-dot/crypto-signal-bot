version: "3.9"

services:
  bot:
    build: .
    container_name: crypto-signal-bot
    env_file: .env
    volumes:
      - ./results:/app/results
    command: python main.py
    restart: unless-stopped

  backtest:
    build: .
    container_name: crypto-backtest
    volumes:
      - ./results:/app/results
    command: python backtest_engine.py
    profiles: ["backtest"]
